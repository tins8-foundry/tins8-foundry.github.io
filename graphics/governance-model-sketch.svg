<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1200"
  height="720"
  viewBox="0 0 1200 720"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">Governed delegation sketch</title>
  <desc id="desc">
    A sketchy diagram showing a goal flowing into a review, then through an
    approval boundary into bounded action and back into evidence.
  </desc>

  <defs>
    <linearGradient id="paper" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffaf1" />
      <stop offset="100%" stop-color="#f3ead9" />
    </linearGradient>
    <linearGradient id="note" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff2b8" />
      <stop offset="100%" stop-color="#f6db73" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#10243a" flood-opacity="0.12" />
    </filter>
  </defs>

  <rect width="1200" height="720" rx="36" fill="url(#paper)" />
  <path
    d="M54 92 C220 34, 430 30, 601 70 S972 106, 1148 74"
    fill="none"
    stroke="#d8cab0"
    stroke-width="3"
    stroke-linecap="round"
    stroke-dasharray="2 16"
    opacity="0.75"
  />

  <text
    x="84"
    y="88"
    fill="#0f5063"
    font-family="Outfit, Manrope, sans-serif"
    font-size="34"
    font-weight="800"
  >
    Governance In The Model
  </text>
  <text
    x="84"
    y="122"
    fill="#546070"
    font-family="Manrope, Arial, sans-serif"
    font-size="19"
    font-weight="600"
  >
    A sketch of governed delegation from intent to evidence
  </text>

  <g filter="url(#shadow)">
    <g transform="rotate(-2 175 250)">
      <rect x="80" y="170" width="190" height="156" rx="22" fill="#ffffff" stroke="#17354d" stroke-width="3.2" />
      <rect x="84" y="174" width="190" height="156" rx="22" fill="none" stroke="#17354d" stroke-width="1.3" opacity="0.45" />
      <text x="108" y="212" fill="#0f6c78" font-family="Outfit, Manrope, sans-serif" font-size="20" font-weight="800">1. Goal</text>
      <text x="108" y="244" fill="#10243a" font-family="Manrope, Arial, sans-serif" font-size="22" font-weight="700">Increase leads</text>
      <text fill="#546070" font-family="Manrope, Arial, sans-serif" font-size="16">
        <tspan x="108" y="272">Target, owner,</tspan>
        <tspan x="108" y="294">cadence</tspan>
      </text>
    </g>

    <g transform="rotate(1.2 428 255)">
      <rect x="328" y="175" width="220" height="150" rx="22" fill="#ffffff" stroke="#17354d" stroke-width="3.2" />
      <rect x="332" y="179" width="220" height="150" rx="22" fill="none" stroke="#17354d" stroke-width="1.3" opacity="0.45" />
      <text x="356" y="220" fill="#0f6c78" font-family="Outfit, Manrope, sans-serif" font-size="20" font-weight="800">2. Review</text>
      <text fill="#10243a" font-family="Manrope, Arial, sans-serif" font-size="22" font-weight="700">
        <tspan x="356" y="252">Check the signals</tspan>
      </text>
      <text fill="#546070" font-family="Manrope, Arial, sans-serif" font-size="17">
        <tspan x="356" y="281">What changed?</tspan>
        <tspan x="356" y="304">Are we drifting?</tspan>
      </text>
    </g>

    <g transform="rotate(-1.4 705 252)">
      <rect x="603" y="168" width="208" height="168" rx="22" fill="#fff7e4" stroke="#80500a" stroke-width="3.2" />
      <rect x="607" y="172" width="208" height="168" rx="22" fill="none" stroke="#80500a" stroke-width="1.3" opacity="0.45" />
      <text x="632" y="212" fill="#9b6111" font-family="Outfit, Manrope, sans-serif" font-size="20" font-weight="800">3. Boundary</text>
      <text fill="#10243a" font-family="Manrope, Arial, sans-serif" font-size="21" font-weight="700">
        <tspan x="632" y="242">Approval + scope</tspan>
      </text>
      <text fill="#6b5a36" font-family="Manrope, Arial, sans-serif" font-size="16">
        <tspan x="632" y="271">Who may act?</tspan>
        <tspan x="632" y="294">Under which limits?</tspan>
      </text>
    </g>

    <g transform="rotate(1.1 974 260)">
      <rect x="870" y="172" width="238" height="154" rx="22" fill="#eef6f8" stroke="#0f6c78" stroke-width="3.2" />
      <rect x="874" y="176" width="238" height="154" rx="22" fill="none" stroke="#0f6c78" stroke-width="1.3" opacity="0.45" />
      <text x="900" y="216" fill="#0f6c78" font-family="Outfit, Manrope, sans-serif" font-size="20" font-weight="800">4. Action</text>
      <text fill="#10243a" font-family="Manrope, Arial, sans-serif" font-size="22" font-weight="700">
        <tspan x="900" y="249">Task runs in scope</tspan>
      </text>
      <text fill="#546070" font-family="Manrope, Arial, sans-serif" font-size="17">
        <tspan x="900" y="279">Human or agent follows</tspan>
        <tspan x="900" y="302">the allowed lane</tspan>
      </text>
    </g>
  </g>

  <g fill="none" stroke="#17354d" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M271 242 C298 236, 307 237, 330 245" />
    <path d="M269 255 C299 248, 309 250, 332 259" opacity="0.55" />
    <path d="M318 232 l14 13 -19 7" />

    <path d="M549 248 C572 244, 584 244, 606 248" />
    <path d="M548 261 C573 257, 585 258, 607 262" opacity="0.55" />
    <path d="M594 236 l14 12 -18 8" />

    <path d="M812 247 C837 243, 847 242, 874 246" />
    <path d="M810 261 C836 256, 847 257, 874 260" opacity="0.55" />
    <path d="M861 234 l13 13 -18 8" />

    <path d="M990 327 C984 418, 827 448, 676 445 C514 442, 336 414, 249 357" />
    <path d="M997 333 C993 420, 832 455, 676 453 C516 451, 335 421, 243 364" opacity="0.45" />
    <path d="M257 347 l-12 16 22 1" />
  </g>

  <g filter="url(#shadow)" transform="rotate(-3 930 504)">
    <rect x="838" y="430" width="278" height="176" rx="18" fill="url(#note)" stroke="#80500a" stroke-width="2.8" />
    <text x="866" y="472" fill="#6f470b" font-family="Outfit, Manrope, sans-serif" font-size="20" font-weight="800">Always ask:</text>
    <text x="866" y="510" fill="#4f3c1d" font-family="Manrope, Arial, sans-serif" font-size="19">Why did this action happen?</text>
    <text x="866" y="540" fill="#4f3c1d" font-family="Manrope, Arial, sans-serif" font-size="19">Who approved the lane?</text>
    <text x="866" y="570" fill="#4f3c1d" font-family="Manrope, Arial, sans-serif" font-size="19">What evidence came back?</text>
  </g>

  <g transform="rotate(1.8 388 532)">
    <rect x="122" y="440" width="566" height="188" rx="24" fill="#ffffff" stroke="#17354d" stroke-width="3.2" filter="url(#shadow)" />
    <rect x="126" y="444" width="566" height="188" rx="24" fill="none" stroke="#17354d" stroke-width="1.3" opacity="0.4" />
    <text fill="#0f6c78" font-family="Outfit, Manrope, sans-serif" font-size="20" font-weight="800">
      <tspan x="154" y="482">5. Evidence returns</tspan>
      <tspan x="154" y="507">to the next check-in</tspan>
    </text>
    <text fill="#10243a" font-family="Manrope, Arial, sans-serif" font-size="20" font-weight="700">
      <tspan x="154" y="538">Artifacts, approvals, and outcomes</tspan>
      <tspan x="154" y="563">stay tied to the goal.</tspan>
    </text>
    <text fill="#546070" font-family="Manrope, Arial, sans-serif" font-size="15">
      <tspan x="154" y="588">That is what turns automation into governed</tspan>
      <tspan x="154" y="610">delegation instead of invisible autonomy.</tspan>
    </text>
  </g>
</svg>
