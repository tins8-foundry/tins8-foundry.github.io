      <stop offset="0%" stop-color="#fffaf1" />
      <stop offset="100%" stop-color="#f2e8d7" />
    </linearGradient>
    <linearGradient id="goalCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#eef5f8" />
    </linearGradient>
    <linearGradient id="growthCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff9ea" />
      <stop offset="100%" stop-color="#f4ead2" />
    </linearGradient>
    <linearGradient id="infraCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eef6fa" />
      <stop offset="100%" stop-color="#deebf3" />
    </linearGradient>
    <linearGradient id="costCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eef8f2" />
      <stop offset="100%" stop-color="#dceee4" />
    </linearGradient>
    <linearGradient id="note" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff1b9" />
      <stop offset="100%" stop-color="#f6db73" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="135%">
      <feDropShadow
        dx="0"
        dy="12"
        stdDeviation="12"
        flood-color="#10243a"
        flood-opacity="0.12"
      />
    </filter>
  </defs>

  <rect width="1320" height="920" rx="36" fill="url(#paper)" />
  <path
    d="M46 92 C242 42, 474 34, 660 64 S1042 104, 1270 72"
