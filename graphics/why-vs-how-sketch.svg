  <title id="title">Keep the why clear as work changes</title>
  <desc id="desc">
    A hand-drawn style sketch with three examples. In each row, the goal and
    why stay visible on the left while the current setup on the right can
    change. The examples are lead growth, staging setup, and cloud cost.
  </desc>

  <defs>
