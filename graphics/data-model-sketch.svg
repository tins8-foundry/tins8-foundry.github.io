<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1320"
  height="840"
  viewBox="0 0 1320 840"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">Data model sketch</title>
  <desc id="desc">
    A hand-drawn style diagram of the core data model: goal, target,
    goal check-in, project, task, agent execution run, project update, and
    evidence reference.
  </desc>

  <defs>
    <linearGradient id="paper" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffaf1" />
      <stop offset="100%" stop-color="#f1e7d6" />
    </linearGradient>
    <linearGradient id="goalCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f2f6f8" />
    </linearGradient>
    <linearGradient id="checkinCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eef8fa" />
      <stop offset="100%" stop-color="#dcedf1" />
    </linearGradient>
    <linearGradient id="projectCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff8e8" />
      <stop offset="100%" stop-color="#f4ead2" />
    </linearGradient>
    <linearGradient id="taskCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eef4fa" />
      <stop offset="100%" stop-color="#dde8f2" />
    </linearGradient>
    <linearGradient id="runCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eef8f4" />
      <stop offset="100%" stop-color="#dbeee5" />
    </linearGradient>
    <linearGradient id="note" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff2b8" />
      <stop offset="100%" stop-color="#f6da73" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="135%">
      <feDropShadow
        dx="0"
        dy="12"
        stdDeviation="12"
        flood-color="#10243a"
        flood-opacity="0.12"
      />
    </filter>
  </defs>

  <rect width="1320" height="840" rx="36" fill="url(#paper)" />
  <path
    d="M46 94 C242 42, 480 32, 660 66 S1042 108, 1268 70"
    fill="none"
    stroke="#d7cab2"
    stroke-width="3"
    stroke-linecap="round"
